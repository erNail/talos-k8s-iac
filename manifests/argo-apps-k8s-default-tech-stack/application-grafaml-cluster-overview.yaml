apiVersion: "argoproj.io/v1alpha1"
kind: "Application"
metadata:
  name: "grafaml-cluster-overview"
spec:
  project: "k8s-default-tech-stack"
  sources:
    - repoURL: "https://github.com/erNail/talos-k8s-iac"
      targetRevision: "main"
      ref: "values"
    - repoURL: "registry-1.docker.io/ernail"
      chart: "grafaml"
      targetRevision: "2.1.0"
      helm:
        releaseName: "cluster-overview"
        valueFiles:
          - "$values/charts/grafaml/values-cluster-overview.yaml"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "monitoring"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - "CreateNamespace=true"